<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Florencia OS | Chat</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
border-right:1px solid #1e293b;
}

.logo{
font-size:20px;
font-weight:bold;
color:#7c5cff;
}

.newchat{
padding:10px;
border:none;
background:#7c5cff;
color:white;
border-radius:8px;
cursor:pointer;
}

.conversations{
flex:1;
overflow:auto;
}

.convo{
padding:10px;
border-radius:6px;
margin-bottom:6px;
background:#0f172a;
cursor:pointer;
}

/* CHAT AREA */

.chat-container{
flex:1;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
padding:30px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:20px;
}

/* messages */

.message{
max-width:700px;
padding:15px;
border-radius:12px;
}

.user{
background:#7c5cff;
align-self:flex-end;
}

.ai{
background:#1e293b;
align-self:flex-start;
}

/* input zone */

.input-area{
padding:20px;
border-top:1px solid #1e293b;
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
border-radius:8px;
border:none;
background:#1e293b;
color:white;
}

button{
padding:12px 16px;
background:#7c5cff;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Florencia AI
</div>

<button class="newchat">
+ Nouveau chat
</button>

<div class="conversations">

<div class="convo">Discussion 1</div>
<div class="convo">Discussion 2</div>

</div>

</div>

<!-- CHAT -->

<div class="chat-container">

<div class="messages" id="messages">

<div class="message ai">
Bonjour. Je suis Florencia. Comment puis-je t'aider ?
</div>

</div>

<div class="input-area">

<input id="userInput" placeholder="Écris ton message...">

<button onclick="sendMessage()">Envoyer</button>

</div>

</div>

<script>

function sendMessage(){

let input=document.getElementById("userInput")
let text=input.value

if(text==="") return

let messages=document.getElementById("messages")

let user=document.createElement("div")
user.className="message user"
user.innerText=text

messages.appendChild(user)

input.value=""

setTimeout(()=>{

let ai=document.createElement("div")
ai.className="message ai"
ai.innerText="Florencia réfléchit..."

messages.appendChild(ai)

messages.scrollTop=messages.scrollHeight

},500)

}

</script>

</body>
</html>
