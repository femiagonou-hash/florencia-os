<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florencia OS | Chat</title>

  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#0f172a;
      color:white;
      display:flex;
      height:100vh;
    }

    /* SIDEBAR */

    .sidebar{
      width:260px;
      background:#020617;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:20px;
      border-right:1px solid #1e293b;
    }

    .logo{
      font-size:20px;
      font-weight:bold;
      color:#7c5cff;
    }

    .newchat{
      padding:10px;
      border:none;
      background:#7c5cff;
      color:white;
      border-radius:8px;
      cursor:pointer;
    }

    .conversations{
      flex:1;
      overflow:auto;
    }

    .convo{
      padding:10px;
      border-radius:6px;
      margin-bottom:6px;
      background:#0f172a;
      cursor:pointer;
    }

    /* CHAT AREA */

    .chat-container{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .messages{
      flex:1;
      padding:30px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    /* messages */

    .message{
      max-width:700px;
      padding:15px;
      border-radius:12px;
      white-space:pre-wrap;
      line-height:1.5;
    }

    .user{
      background:#7c5cff;
      align-self:flex-end;
    }

    .ai{
      background:#1e293b;
      align-self:flex-start;
    }

    /* input zone */

    .input-area{
      padding:20px;
      border-top:1px solid #1e293b;
      display:flex;
      gap:10px;
    }

    input{
      flex:1;
      padding:12px;
      border-radius:8px;
      border:none;
      background:#1e293b;
      color:white;
      outline:none;
    }

    button{
      padding:12px 16px;
      background:#7c5cff;
      border:none;
      color:white;
      border-radius:8px;
      cursor:pointer;
    }

    button:disabled{
      opacity:0.7;
      cursor:not-allowed;
    }
  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">
      Florencia AI
    </div>

    <button class="newchat" onclick="newChat()">
      + Nouveau chat
    </button>

    <div class="conversations">
      <div class="convo">Discussion 1</div>
      <div class="convo">Discussion 2</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="message ai">
Bonjour. Je suis Florencia. Comment puis-je t'aider ?
      </div>
    </div>

    <div class="input-area">
      <input id="userInput" placeholder="Écris ton message...">
      <button id="sendBtn" onclick="sendMessage()">Envoyer</button>
    </div>
  </div>

  <script>
    const input = document.getElementById("userInput");
    const messages = document.getElementById("messages");
    const sendBtn = document.getElementById("sendBtn");

    input.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    function newChat() {
      messages.innerHTML = `
        <div class="message ai">
Bonjour. Je suis Florencia. Comment puis-je t'aider ?
        </div>
      `;
      input.value = "";
      input.focus();
    }

    async function sendMessage() {
      const text = input.value.trim();

      if (text === "") return;

      const user = document.createElement("div");
      user.className = "message user";
      user.innerText = text;
      messages.appendChild(user);

      input.value = "";
      messages.scrollTop = messages.scrollHeight;

      const thinking = document.createElement("div");
      thinking.className = "message ai";
      thinking.innerText = "Florencia réfléchit...";
      messages.appendChild(thinking);
      messages.scrollTop = messages.scrollHeight;

      sendBtn.disabled = true;

      try {
        const response = await fetch("/.netlify/functions/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: text
          })
        });

        const data = await response.json();

        thinking.innerText = data.reply || data.error || "Erreur inconnue.";
      } catch (error) {
        thinking.innerText = "Erreur de connexion avec l'IA.";
      } finally {
        sendBtn.disabled = false;
        messages.scrollTop = messages.scrollHeight;
      }
    }
  </script>

</body>
</html>
